{% extends "base.html" %}
{% block content %}
<h1>Upravujete: {{ article.title }}</h1>
<form method="POST">
    <textarea name="content" rows="20" style="width: 100%; background: #101418; color: #eaecf0; border: 1px solid #54595d; padding: 10px; font-family: monospace; border-radius: 2px; box-sizing: border-box;" required>{{ content }}</textarea>

    {% if is_admin %}
    <div class="attributes-grid" style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="background: #2a2a2c; padding: 15px; border: 1px solid #54595d; border-radius: 2px;">
            <h3 style="margin-top: 0;">Klíčová slova</h3>
            <p style="font-size: 0.9em; color: #a2a9b1;">Odděleno čárkou (např. rychlý, sedan, luxusní)</p>
            <input type="text" name="keywords" value="{{ article.keywords|map(attribute='word')|join(', ') }}">
        </div>
    </div>
    {% endif %}

    <button type="submit" class="btn" style="margin-top: 15px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Odeslat revizi</button>
</form>
{% endblock %}

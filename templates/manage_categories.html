{% extends "base.html" %}
{% block content %}
<h1><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 10px;"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Správa sekcí</h1>
<a href="{{ url_for('admin.dashboard') }}">Zpět do Administrace</a>

<h3 style="margin-top: 30px;">Vytvořit novou sekci</h3>
<form method="POST" style="max-width: 400px; background: #2a2a2c; padding: 20px; border: 1px solid #54595d; border-radius: 2px;">
    <label>Název sekce</label>
    <input type="text" name="name" required>

    <label>Typ sekce</label>
    <input type="text" name="type" required>

    <button type="submit" class="btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Vytvořit sekci</button>
</form>

<h3 style="margin-top: 30px;">Existující sekce</h3>
<ul class="admin-list">
    {% for c in categories %}
    <li class="admin-list-item">
        <div>
            <strong>{{ c.name }}</strong>
            <span class="meta-info">(Typ: {{ c.type }} | Článků: {{ c.articles|length }})</span>
        </div>
        <div>
            <a href="{{ url_for('admin.edit_category', id=c.id) }}" class="btn btn-sm" style="background-color: #2a2a2c; border-color: #54595d; margin-right: 5px;">Upravit</a>
            <form method="POST" action="{{ url_for('admin.delete_category', id=c.id) }}" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Smazáním této kategorie trvale smažete VŠECHNY články v ní. Jste si jisti?');"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
            </form>
        </div>
    </li>
    {% endfor %}
</ul>
{% endblock %}

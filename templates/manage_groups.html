{% extends "base.html" %}
{% block content %}
<h1><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 10px;"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>Správa skupin</h1>
<a href="{{ url_for('admin.dashboard') }}">Zpět do Administrace</a>

<h3 style="margin-top: 30px;">Vytvořit novou skupinu</h3>
<form method="POST" style="max-width: 400px; background: #2a2a2c; padding: 20px; border: 1px solid #54595d; border-radius: 2px;">
    <label>Název skupiny</label>
    <input type="text" name="name" required>

    <label style="display: flex; align-items: center; margin-bottom: 10px; cursor: pointer;">
        <input type="checkbox" name="is_super_admin" style="width: auto; margin-right: 10px;"> Administrátorská oprávnění
    </label>

    <button type="submit" class="btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Vytvořit skupinu</button>
</form>

<h3 style="margin-top: 30px;">Existující skupiny</h3>
<ul class="admin-list">
    {% for g in groups %}
    <li class="admin-list-item">
        <div>
            <strong>{{ g.name }}</strong>
            <span class="meta-info">
                (Členů: {{ g.users|length }} | Admin: {{ 'Ano' if g.is_super_admin else 'Ne' }})
            </span>
        </div>
        <div>
            <a href="{{ url_for('admin.edit_group', id=g.id) }}" class="btn btn-sm" style="background-color: #2a2a2c; border-color: #54595d; margin-right: 5px;">Upravit</a>
            <form method="POST" action="{{ url_for('admin.delete_group', id=g.id) }}" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
            </form>
        </div>
    </li>
    {% endfor %}
</ul>
{% endblock %}

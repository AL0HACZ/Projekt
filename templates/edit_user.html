{% extends "base.html" %}
{% block content %}
<h1>Úprava uživatele: {{ target_user.username }}</h1>
<a href="{{ url_for('admin.manage_users') }}">Zpět do Správy uživatel</a>

<form method="POST" style="max-width: 500px; margin-top: 20px; background: #2a2a2c; padding: 20px; border: 1px solid #54595d;">
    <label>Uživatelské jméno</label>
    <input type="text" name="username" value="{{ target_user.username }}" required>

    <label>Zobrazované jméno</label>
    <input type="text" name="display_name" value="{{ target_user.display_name }}" required>

    <label>O mně</label>
    <textarea name="about_me" rows="8">{{ target_user.about_me }}</textarea>

    <button type="submit" class="btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Potvrdit změny</button>
</form>
{% endblock %}
